<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}VidFetch - Download Videos from 1000+ Sites{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-6h2v6zm8 0h-2v-6h2v6z'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('index') }}" class="logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">VidFetch</span>
            </a>
            <button class="mobile-menu-btn" aria-label="Menu">☰</button>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><button id="theme-toggle" class="theme-toggle" aria-label="Switch theme">🌙</button></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-icon">🎬</span>
                    <span>VidFetch</span>
                    <p>Download videos effortlessly • No FFmpeg required</p>
                </div>
                <div class="footer-links">
                    <a href="{{ url_for('about') }}#privacy">Privacy</a>
                    <a href="{{ url_for('about') }}#legal">Legal</a>
                    <a href="https://github.com" target="_blank">GitHub</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2025 VidFetch — Powered by yt-dlp</p>
            </div>
        </div>
    </footer>
</body>
</html>
